# Photometry processing presets
#
# Each preset specifies which method to use for each processing step.
# Parameters for each method come from method_defaults below.
# Users can override specific parameters via processing_overrides in session metadata.

# ============================================================
# Presets: pick a method, or "none", for each step.
# ============================================================

presets:
  # Default for dLight1.3b and dLight3.8. This exactly matches Tim's original pipeline.
  dlight_isosbestic:
    description: >
      smooth with rolling mean, airPLS baseline, isosbestic Lasso correction,
      median zscore (Tim's original pipeline)
    smoothing: rolling_mean
    baseline: airpls
    normalization: median_zscore
    correction: isosbestic_lasso

  # Same as dlight_isosbestic but with a lower airPLS lambda (tighter baseline).
  # Useful when the baseline has sharper fluctuations when plugging was unstable that the default lambda under-fits.
  # higher lambda = smoother baseline, lower = follows signal more closely.
  dlight_isosbestic_tight_baseline:
    description: >
      smooth with rolling mean, tight airPLS baseline (lambda=1e6),
      isosbestic Lasso correction, median zscore
    smoothing: rolling_mean
    baseline: airpls
    normalization: median_zscore
    correction: isosbestic_lasso
    param_overrides:
      baseline:
        lambda: 1.0e+5

  # dLight with double exponential baseline instead of airPLS.
  # Useful when we want to remove photobleaching drift but don't want to remove 
  # other (potentially relevant) low-frequency variation in the signal
  dlight_isosbestic_double_exp:
    description: >
      smooth with rolling mean, double exponential baseline,
      isosbestic Lasso correction, median zscore
    smoothing: rolling_mean
    baseline: double_exp
    normalization: median_zscore
    correction: isosbestic_lasso

  # No baseline correction. Useful if we are interested in changes in the signal on
  # slow timescales that would be removed by a highpass filter, airPLS, etc.
  dlight_isosbestic_no_baseline:
    description: >
      smooth with rolling mean, no baseline correction,
      isosbestic Lasso correction, median zscore
    smoothing: rolling_mean
    baseline: none
    normalization: median_zscore
    correction: isosbestic_lasso

  # Default for gACh. Classic pyPhotometry filtering, baseline removal, and normalization. Ratiometric correction.
  gach_ratiometric:
    description: >
      smooth with lowpass filter, remove photobleaching drift with highpass filter,
      mean zscore, ratiometric correction (470/405)
    smoothing: lowpass
    baseline: highpass
    normalization: mean_zscore
    correction: ratiometric

  # Default for rDA3m. Classic pyPhotometry filtering, baseline removal, and normalization. No correction.
  classic_filtering:
    description: >
      smooth with lowpass filter, remove photobleaching drift with highpass filter,
      mean zscore
    smoothing: lowpass
    baseline: highpass
    normalization: mean_zscore
    correction: none

# ============================================================
# Default parameters for each method.
# When a preset selects a method, these params are auto-applied.
# Users never need to specify these unless overriding a specific value.
# ============================================================

method_defaults:
  smoothing:
    rolling_mean:
      window_fraction: 0.0333   # window = Fs * this value (~8ms at 250Hz)
    lowpass:
      cutoff_hz: 10
      order: 2
  baseline:
    airpls:
      lambda: 1.0e+8
      max_iterations: 50
      mode: subtract       # "subtract": signal - baseline | "dff": (signal - baseline) / baseline
    double_exp:
      tau_slow: 3600       # initial guess for slow time constant in seconds
      tau_multiplier: 0.1  # tau_fast = tau_slow * tau_multiplier
      mode: subtract       # "subtract" or "dff"
    highpass:
      cutoff_hz: 0.001
      order: 2
  normalization:
    median_zscore: {}            # (signal - median) / std
    mean_zscore: {}              # (signal - mean) / std
  correction:
    isosbestic_lasso:
      alpha: 0.0001
    ratiometric: {}             # raw signal / raw reference
